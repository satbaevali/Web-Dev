<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: Position planet</title>
        <style>
            #container{
                position: relative;
                width: 300px;
            }
        
            #planet{
                display: block;
                width: 300px;
                
            }

            #greeting {
                position: absolute;
                top: 10px;
                left:70%;
                transform: translateX(-50%);
                text-align: center;
                z-index: 1;

                background: rgb(255, 255, 0);
                border: 2px solid black;
                font-family: "Comic Sans MS", fantasy;
                padding: 5px;
                width: 262px;
            }
            
            #creature {
                position: absolute;
                top: 75px;
                left: 40px;
                
            }
        </style>
    </head>
    <body>
        <div id="container">
            <img id="planet" src="https://www.kasandbox.org/programming-images/space/planet.png" width="300">
        
            <div id="greeting">
                <p>Hello! Welcome to position planet!</p>
            </div>

        </div>

        
        
        
        <img id="creature" src="https://www.kasandbox.org/programming-images/avatars/mr-pink.png">
        

    </body>
</html>
