    <h1>Tarantella</h1>
    <p>Do you remember an Inn,
        Miranda?
        Do you remember an Inn?
        And the tedding and the spreading
        Of the straw for a bedding,
        And the fleas that tease in the High Pyrenees,
        And the wine that tasted of tar?</p>
